name: Build and Deploy Nurexus
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Distribute to Firebase
        env:
          # This connects the secret you just made to the build
          SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # This writes your JSON key to a temporary file
          echo "$SERVICE_ACCOUNT_JSON" > service-account.json
          
          # This tells Firebase to use that file to log in
          export GOOGLE_APPLICATION_CREDENTIALS=./service-account.json
          
          # This uploads the app
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-debug.apk \
            --app 1:56974215210:android:41b1d89410e53fdb1c1b53 \
            --groups nurexus
