name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: app-file
          path: build/app/outputs/flutter-apk/*.apk
