name: Build Nurexus APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # v4 is the stable version; we use an environment variable to handle the Node 24 warning
      - name: Checkout code
        uses: actions/checkout@v4
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

      # v2 is the correct stable version for this action as of today
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      # v4 is the current stable release for uploading
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nurexus-app
          path: build/app/outputs/flutter-apk/app-debug.apk
