name: Nurexus Build
on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Build
        run: |
          flutter pub get
          flutter build apk --debug
          
      - name: Upload to Firebase
        env:
          KEY_DATA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Create key file
          echo "$KEY_DATA" > credential.json
          export GOOGLE_APPLICATION_CREDENTIALS=./credential.json
          
          # Install and run uploader
          npm install -g firebase-tools
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-debug.apk \
            --app "1:56974215210:android:41b1d89410e53fdb1c1b53" \
            --groups "nurexus"
