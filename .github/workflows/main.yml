name: Nurexus Build & Deploy
on:
  push:
    branches:
      - main  # This triggers the robot every time you push code to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Get your latest code from the repository
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Flutter environment (Uses cache to save time/data)
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true 

      # 3. Install dependencies and build the app
      - name: 🏗️ Build APK
        run: |
          flutter pub get
          flutter build apk --debug

      # 4. Upload the built file to your testers
      - name: 🚀 Upload to Firebase App Distribution
        env:
          KEY_DATA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Create the temporary security credential file
          echo "$KEY_DATA" > credential.json
          
          # Install the Firebase Uploader tool
          npm install -g firebase-tools
          
          # Run the specific command for Nurexus
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-debug.apk \
            --app "1:56974215210:android:41b1d89410e53fdb1c1b53" \
            --groups "nurexus" \
            --service-credentials-file credential.json
