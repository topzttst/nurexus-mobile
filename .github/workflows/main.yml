name: Build Nurexus APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    # This ensures the builder uses the newest 2026 engine immediately
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Updated to v6 (Supports Node 24 natively)
      - name: Checkout code
        uses: actions/checkout@v6

      # Updated to v3 (Supports newest Node/Flutter environments)
      - name: Setup Flutter
        uses: subosito/flutter-action@v3
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      # Updated to v5 (The newest version for 2026)
      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: nurexus-app
          path: build/app/outputs/flutter-apk/app-debug.apk
